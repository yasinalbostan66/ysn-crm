<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>PİMMS LİNKUP CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="img/logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

</head>

<body>
    <div id="auth-container" style="display:none">
        <div class="auth-card animate-fade-in">
            <div class="auth-logo" style="flex-direction: column; gap: 0;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    LİNKUP CRM
                </div>
                <span
                    style="font-family: 'Caveat', cursive; font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; margin-top: -0.25rem; opacity: 0.85;">Yasin
                    Albostanlı 2026</span>
            </div>

            <h3
                style="text-align: center; color: var(--text-light); font-size: 0.875rem; margin-bottom: 1.5rem; font-weight: 500;">
                Sadece Yetkili Girişi</h3>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>E-POSTA</label>
                    <input type="email" id="login-email" class="auth-input" required value="admin@admin.com"
                        placeholder="ornek@mail.com">
                </div>
                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="login-password" class="auth-input" required value="123"
                        placeholder="••••••••">
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="login-remember" style="width: auto; cursor: pointer;">
                    <label for="login-remember"
                        style="font-size: 0.8rem; color: #64748b; font-weight: 500; text-transform: none; cursor: pointer;">Beni
                        Hatırla</label>
                </div>
                <button type="submit" class="auth-btn" style="margin-top: 0.5rem;">Giriş Yap</button>
            </form>

            <p id="auth-error"
                style="color: var(--danger); font-size: 0.75rem; margin-top: 1rem; text-align: center; font-weight: 500;">
            </p>
        </div>
    </div>
    <div class="dashboard" id="main-dashboard" style="display: none;">
        <div id="sidebar-target"></div>
        <main class="main-content">
            <div id="users-mgmt-view" class="view" style="display: none;">
                <div class="header">
                    <h1>Kullanıcı Yönetimi</h1>
                    <button onclick="openAddUserModal()"
                        style="background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; transition: var(--transition);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="8.5" cy="7" r="4" />
                            <line x1="20" y1="8" x2="20" y2="14" />
                            <line x1="17" y1="11" x2="23" y2="11" />
                        </svg>
                        Yeni Kullanıcı Ekle
                    </button>
                </div>

                <div class="content-card animate-fade-in">
                    <div class="table-header">
                        <h3 style="font-size: 1rem; color: var(--text-light);">Sistem Kullanıcıları</h3>
                    </div>
                    <div class="table-overflow">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ad Soyad</th>
                                    <th>E-Posta</th>
                                    <th>Rol</th>
                                    <th>İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <!-- User rows will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
        <script src="js/common.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/visits.js"></script>
    <script src="js/services.js"></script>
    <script src="js/marketing.js"></script>
    <script src="js/users.js"></script>
    <script src="js/announcements.js"></script>
    <script src="js/components.js?v=2"></script>
    <script src="js/modals.js"></script>
    <script type="module" src="js/firebase.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>

</html>
