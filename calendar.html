<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>PİMMS LİNKUP CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="img/logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

</head>

<body>
    <div id="auth-container">
        <div class="auth-card animate-fade-in">
            <div class="auth-logo" style="flex-direction: column; gap: 0;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    LİNKUP CRM
                </div>
                <span
                    style="font-family: 'Caveat', cursive; font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; margin-top: -0.25rem; opacity: 0.85;">Yasin
                    Albostanlı 2026</span>
            </div>

            <h3
                style="text-align: center; color: var(--text-light); font-size: 0.875rem; margin-bottom: 1.5rem; font-weight: 500;">
                Sadece Yetkili Girişi</h3>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>E-POSTA</label>
                    <input type="email" id="login-email" class="auth-input" required value="admin@admin.com"
                        placeholder="ornek@mail.com">
                </div>
                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="login-password" class="auth-input" required value="123"
                        placeholder="••••••••">
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="login-remember" style="width: auto; cursor: pointer;">
                    <label for="login-remember"
                        style="font-size: 0.8rem; color: #64748b; font-weight: 500; text-transform: none; cursor: pointer;">Beni
                        Hatırla</label>
                </div>
                <button type="submit" class="auth-btn" style="margin-top: 0.5rem;">Giriş Yap</button>
            </form>

            <p id="auth-error"
                style="color: var(--danger); font-size: 0.75rem; margin-top: 1rem; text-align: center; font-weight: 500;">
            </p>
        </div>
    </div>
    <div class="dashboard" id="main-dashboard" style="display: none;">
        <div id="sidebar-target"></div>
        <main class="main-content">
            <div id="visits-view" class="view" style="display: none;">
                <div class="header">
                    <h1>Ziyaret Planı & Takvim</h1>
                    <div style="display: flex; gap: 1rem;">
                        <button onclick="exportCalendarToPDF()"
                            style="background: #ef4444; color: white; border: none; padding: 0.75rem 1.25rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.85rem;">
                            <i class="fa-solid fa-file-pdf"></i> PDF Al
                        </button>
                        <button onclick="exportCalendarToExcel()"
                            style="background: #10b981; color: white; border: none; padding: 0.75rem 1.25rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.85rem;">
                            <i class="fa-solid fa-file-excel"></i> Excel Al
                        </button>
                        <button onclick="openServiceFormModal()"
                            style="background: var(--warning); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path
                                    d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z">
                                </path>
                            </svg>
                            Yeni Servis Talebi
                        </button>
                        <button onclick="openVisitModal()"
                            style="background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Yeni Ziyaret Planla
                        </button>
                    </div>
                </div>

                <!-- Visit Stats Grid -->
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                    <div class="stat-card" style="padding: 1.25rem; border-left: 4px solid var(--primary);">
                        <span
                            style="font-size: 0.75rem; color: var(--text-light); font-weight: 600; text-transform: uppercase;">Bugünkü
                            Ziyaretler</span>
                        <h2 id="visits-count-today" style="font-size: 1.75rem; margin-top: 0.5rem;">0</h2>
                    </div>
                    <div class="stat-card" style="padding: 1.25rem; border-left: 4px solid var(--warning);">
                        <span
                            style="font-size: 0.75rem; color: var(--text-light); font-weight: 600; text-transform: uppercase;">Haftalık
                            Plan</span>
                        <h2 id="visits-count-week" style="font-size: 1.75rem; margin-top: 0.5rem;">0</h2>
                    </div>
                    <div class="stat-card" style="padding: 1.25rem; border-left: 4px solid var(--success);">
                        <span
                            style="font-size: 0.75rem; color: var(--text-light); font-weight: 600; text-transform: uppercase;">Aylık
                            Toplam</span>
                        <h2 id="visits-count-month" style="font-size: 1.75rem; margin-top: 0.5rem;">0</h2>
                    </div>
                </div>

                <!-- Calendar View Header & Container -->
                <!-- Calendar View Header & Container -->
                <div class="content-card animate-fade-in" style="margin-bottom: 1.5rem; padding: 1rem;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.75rem;">
                        <h3 id="calendar-title"
                            style="font-size: 1.05rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 0.5rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                            Takvim
                        </h3>
                        <div
                            style="display: flex; gap: 0.35rem; background: var(--bg); padding: 0.2rem; border-radius: 0.4rem;">
                            <button onclick="setCalendarMode('day')" id="btn-mode-day"
                                style="padding: 0.4rem 0.8rem; border-radius: 0.3rem; border: none; background: transparent; color: var(--text-light); cursor: pointer; font-size: 0.75rem; font-weight: 700;">Günlük</button>
                            <button onclick="setCalendarMode('week')" id="btn-mode-week"
                                style="padding: 0.4rem 0.8rem; border-radius: 0.3rem; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 0.75rem; font-weight: 700;">Haftalık</button>
                            <button onclick="setCalendarMode('month')" id="btn-mode-month"
                                style="padding: 0.4rem 0.8rem; border-radius: 0.3rem; border: none; background: transparent; color: var(--text-light); cursor: pointer; font-size: 0.75rem; font-weight: 700;">Aylık</button>
                            <button onclick="setCalendarMode('year')" id="btn-mode-year"
                                style="padding: 0.4rem 0.8rem; border-radius: 0.3rem; border: none; background: transparent; color: var(--text-light); cursor: pointer; font-size: 0.75rem; font-weight: 700;">Yıllık</button>
                        </div>
                        <div style="display: flex; gap: 0.35rem; align-items: center;">
                            <button onclick="showDayRoute()" id="btn-show-route"
                                style="background: #db2777; border: none; padding: 0.4rem 0.75rem; border-radius: 0.35rem; cursor: pointer; font-size: 0.75rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 0.35rem; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(219, 39, 119, 0.3);">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="3">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                GÜNÜN ROTASI
                            </button>
                            <button onclick="navigateCalendar(-1)"
                                style="background: var(--bg); border: 1px solid var(--border); padding: 0.4rem; border-radius: 0.35rem; cursor: pointer; color: var(--text);"><svg
                                    width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg></button>
                            <button onclick="todayCalendar()"
                                style="background: var(--bg); border: 1px solid var(--border); padding: 0.4rem 0.75rem; border-radius: 0.35rem; cursor: pointer; font-size: 0.75rem; font-weight: 700; color: var(--text);">Bugün</button>
                            <button onclick="navigateCalendar(1)"
                                style="background: var(--bg); border: 1px solid var(--border); padding: 0.4rem; border-radius: 0.35rem; cursor: pointer; color: var(--text);"><svg
                                    width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg></button>
                        </div>
                    </div>
                    <div id="calendar-view-container" style="overflow-x: auto;">
                        <div id="weekly-calendar-grid" style="min-width: 800px;"></div>
                    </div>
                </div>
                <div class="content-card animate-fade-in"
                    style="border: none; box-shadow: var(--shadow); overflow: hidden;">
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead style="border-bottom: 2px solid var(--border); background: var(--bg);">
                                <tr>
                                    <th
                                        style="text-align: left; padding: 0.75rem 1.25rem; font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">
                                        TARİH / SAAT</th>
                                    <th
                                        style="text-align: left; padding: 0.75rem 1.25rem; font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">
                                        ŞİRKET</th>
                                    <th
                                        style="text-align: left; padding: 0.75rem 1.25rem; font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">
                                        SORUMLU</th>
                                    <th
                                        style="text-align: left; padding: 0.75rem 1.25rem; font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">
                                        ZİYARET TÜRÜ</th>
                                    <th
                                        style="text-align: left; padding: 0.75rem 1.25rem; font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">
                                        PADACO / NOTLAR</th>
                                    <th
                                        style="text-align: left; padding: 0.75rem 1.25rem; font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">
                                        İŞLEM</th>
                                </tr>
                            </thead>
                            <tbody id="visits-table-body">
                                <!-- JS items -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
        <script src="js/common.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/visits.js"></script>
    <script src="js/services.js"></script>
    <script src="js/marketing.js"></script>
    <script src="js/users.js"></script>
    <script src="js/announcements.js"></script>
    <script src="js/components.js"></script>
    <script src="js/modals.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
