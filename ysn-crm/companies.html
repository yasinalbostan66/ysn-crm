<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>PİMMS LİNKUP CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="img/logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

</head>

<body>
    <div id="auth-container">
        <div class="auth-card animate-fade-in">
            <div class="auth-logo" style="flex-direction: column; gap: 0;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    LİNKUP CRM
                </div>
                <span
                    style="font-family: 'Caveat', cursive; font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; margin-top: -0.25rem; opacity: 0.85;">Yasin
                    Albostanlı 2026</span>
            </div>

            <h3
                style="text-align: center; color: var(--text-light); font-size: 0.875rem; margin-bottom: 1.5rem; font-weight: 500;">
                Sadece Yetkili Girişi</h3>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>E-POSTA</label>
                    <input type="email" id="login-email" class="auth-input" required value="admin@admin.com"
                        placeholder="ornek@mail.com">
                </div>
                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="login-password" class="auth-input" required value="123"
                        placeholder="••••••••">
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="login-remember" style="width: auto; cursor: pointer;">
                    <label for="login-remember"
                        style="font-size: 0.8rem; color: #64748b; font-weight: 500; text-transform: none; cursor: pointer;">Beni
                        Hatırla</label>
                </div>
                <button type="submit" class="auth-btn" style="margin-top: 0.5rem;">Giriş Yap</button>
            </form>

            <p id="auth-error"
                style="color: var(--danger); font-size: 0.75rem; margin-top: 1rem; text-align: center; font-weight: 500;">
            </p>
        </div>
    </div>
    <div class="dashboard" id="main-dashboard" style="display: none;">
        <div id="sidebar-target"></div>
        <main class="main-content">
            <div id="customers-view" class="view" style="display: none;">
                <div class="header">
                    <h1>Firma Listesi</h1>
                    <div style="display: flex; gap: 0.75rem;">
                        <input type="file" id="excel-import-input" accept=".xlsx, .xls" style="display: none;"
                            onchange="handleExcelImport(event)">
                        <button onclick="document.getElementById('excel-import-input').click()"
                            style="background: var(--card-bg); color: var(--text); border: 1px solid var(--border); padding: 0.6rem 1rem; border-radius: 0.4rem; cursor: pointer; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            İçe Aktar (Excel)
                        </button>
                        <button onclick="exportViewToExcel('customers-view')"
                            style="background: #10b981; color: white; border: none; padding: 0.6rem 1rem; border-radius: 0.4rem; cursor: pointer; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            Excel
                        </button>
                        <button onclick="exportViewToPDF('customers-view')"
                            style="background: #ef4444; color: white; border: none; padding: 0.6rem 1rem; border-radius: 0.4rem; cursor: pointer; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <path d="M12 18V12M9 15l3 3 3-3"></path>
                            </svg>
                            PDF
                        </button>
                        <div id="add-btn-container" style="display: block;">
                            <button onclick="openAddModal()"
                                style="background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; transition: var(--transition);">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19" />
                                    <line x1="5" y1="12" x2="19" y2="12" />
                                </svg>
                                Yeni Firma Ekle
                            </button>
                        </div>
                    </div>
                </div>

                <div class="content-card animate-fade-in">
                    <div class="table-header">
                        <div class="search-container">
                            <span style="position: absolute; left: 0.75rem; top: 0.625rem; color: var(--text-light);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </span>
                            <input type="text" id="customer-search" class="search-input"
                                placeholder="Firma veya şehir ara..." onkeyup="filterCustomers()">
                        </div>
                    </div>
                    <div class="table-overflow">
                        <table id="customer-table">
                            <thead>
                                <tr>
                                    <th>Şirket Adı</th>
                                    <th>Şehir</th>
                                    <th>Ürün</th>
                                    <th>Evre</th>
                                    <th>Gelir ($)</th>
                                    <th>Olasılık</th>
                                    <th>İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="customer-body">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
        <script src="js/common.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/visits.js"></script>
    <script src="js/services.js"></script>
    <script src="js/marketing.js"></script>
    <script src="js/users.js"></script>
    <script src="js/announcements.js"></script>
    <script src="js/components.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
