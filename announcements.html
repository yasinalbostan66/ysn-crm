<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PİMMS SOFT CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="img/logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

</head>

<body>
    <div id="auth-container">
        <div class="auth-card animate-fade-in">
            <div class="auth-logo" style="flex-direction: column; gap: 0;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    SOFT CRM
                </div>
                <span
                    style="font-family: 'Caveat', cursive; font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; margin-top: -0.25rem; opacity: 0.85;">Yasin
                    Albostanlı 2026</span>
            </div>

            <h3
                style="text-align: center; color: var(--text-light); font-size: 0.875rem; margin-bottom: 1.5rem; font-weight: 500;">
                Sadece Yetkili Girişi</h3>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>E-POSTA</label>
                    <input type="email" id="login-email" class="auth-input" required value="admin@admin.com"
                        placeholder="ornek@mail.com">
                </div>
                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="login-password" class="auth-input" required value="123"
                        placeholder="••••••••">
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="login-remember" style="width: auto; cursor: pointer;">
                    <label for="login-remember"
                        style="font-size: 0.8rem; color: #64748b; font-weight: 500; text-transform: none; cursor: pointer;">Beni
                        Hatırla</label>
                </div>
                <button type="submit" class="auth-btn" style="margin-top: 0.5rem;">Giriş Yap</button>
            </form>

            <p id="auth-error"
                style="color: var(--danger); font-size: 0.75rem; margin-top: 1rem; text-align: center; font-weight: 500;">
            </p>
        </div>
    </div>
    <div class="dashboard" id="main-dashboard" style="display: none;">
        <div id="sidebar-target"></div>
        <main class="main-content">
            <div id="announcements-view" class="view" style="display: none;">
                <div class="header">
                    <h1>Duyurular & Bildirimler</h1>
                    <button id="add-announcement-btn" onclick="openAnnouncementModal()"
                        style="background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Duyuru Yayınla
                    </button>
                </div>
                <div id="announcements-container" style="display: grid; grid-template-columns: 1fr; gap: 1rem;">
                    <!-- Announcements rendered here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Announcement Modal -->
    <div id="announcement-modal" class="modal" style="display: none;">
        <div class="modal-content animate-slide-up" style="max-width: 600px;">
            <div class="modal-header">
                <h2>📢 Yeni Duyuru Yayınla</h2>
                <button class="close-btn" onclick="closeAnnouncementModal()">&times;</button>
            </div>
            <form id="announcement-form" class="modal-form" onsubmit="handleNewAnnouncement(event)">
                <div class="input-group">
                    <label>DUYURU BAŞLIĞI</label>
                    <input type="text" id="ann-title" class="auth-input" style="background: var(--bg);" required
                        placeholder="Örn: Hafta Sonu Mesai Duyurusu">
                </div>
                <div class="input-group">
                    <label>DUYURU İÇERİĞİ</label>
                    <textarea id="ann-text" class="auth-input"
                        style="background: var(--bg); min-height: 200px; resize: vertical;" required
                        placeholder="Duyuru metnini buraya yazınız..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="button" class="auth-btn" style="background: var(--border); color: var(--text);"
                        onclick="closeAnnouncementModal()">İptal</button>
                    <button type="submit" class="auth-btn">Duyuruyu Yayınla</button>
                </div>
            </form>
        </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/visits.js"></script>
    <script src="js/services.js"></script>
    <script src="js/marketing.js"></script>
    <script src="js/users.js"></script>
    <script src="js/announcements.js"></script>
    <script src="js/components.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
